<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Formlar</title>
</head>
<body>
	
	<form action="/Home/Register">
		<p>
			Ad :<input type="text" name="ad" placeholder="Adinizi giriniz" required>
		</p>
		
		<p>
			Soyad :<input type="text" name="soyad" placeholder="Soyadinizi giriniz" required> 
		</p>
		<p>
			Eposta :<input type="email" name="email" required> 
		</p>
		<p>
			Sifre :<input type="password" name="sifre" required> 
		</p>
		<p>
			Beni Hatirla<input type="checkbox" name="benihatirla">
		</p>
		<p>
			Erkek<input type="radio" name="cinsiyet">
            Kadin<input type="radio" name="cinsiyet">
		</p>
		<p>
			Hobiler <br>
			Sinema <input type="checkbox" name="hobi">
			Spor <input type="checkbox" name="hobi">
			Kitap okumak <input type="checkbox" name="hobi">
		</p>
		<p>
			En sevdigim renk<input type="color" name="renk">
		</p>
		<p>
			<select name="sehir">
				<option>Kocaeli</option>
                <option>Istanbul</option>
                <option>Ankara</option>
			</select>
		</p>
		<p>
			<select multiple name="sehirler">
				<option>Kocaeli</option>
                <option>Istanbul</option>
                <option>Ankara</option>
			</select>
		</p>
		<input type="number" min="0" max="10">
		<br>
		<br>
		<input type="date">
		<br>
		<br>
		<input type="submit" value="Kaydet">
		<input type="reset">
	</form>
	
</body>
</html>
