<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Hemen Uye Ol</title>
</head>
<body>
	<h1>Lutfen Formu Eksiksiz Doldurunuz.</h1>
    <hr>
    <form>
    	<h4>Hesap Bilgileriniz</h4>
    	<p>
    		Kullanici Adi : <input type="text" name="username" placeholder="Kullanici adi giriniz" required>
    	</p>
        <p>
    		Eposta : <input type="email" name="email" placeholder="E-posta giriniz" required>
    	</p>
       
        <p>
    		Parola : <input type="password" name="sifre" placeholder="Parola giriniz" required>
    	</p>
    
    	<h4>Kisisel Bilgileriniz</h4>
    	<p>
    		Ad : <input type="text" name="ad" required>
    	</p>
    	
    	<p>
    		Soyad : <input type="text" name="soyad" required>
    	</p>
    	
    	<p>
			Sehir : 
			<select name="sehir">
				<option>Seciniz</option>
				<option>Kocaeli</option>
                <option>Istanbul</option>
                <option>Ankara</option>
			</select>
		</p>
  		
   		<p>
  		   	Cinsiyet :
   		   	<input type="radio" name="cinsiyet">Erkek
            <input type="radio" name="cinsiyet">Kadin
   		</p>
   		
   		<p>
   			Hobileriniz : 
   			<input type="checkbox" name="hobiler">Sinema
            <input type="checkbox" name="hobiler">Gezmek
            <input type="checkbox" name="hobiler">Spor
            <input type="checkbox" name="hobiler">Kitap
   		</p>
   		<input type="submit" value="Kaydet">
    </form>
</body>
</html>
